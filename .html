<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h2>Student Records</h2>
<a href="/logout" class="btn btn-danger mb-3">Logout</a>
<a href="/undo" class="btn btn-warning mb-3">Undo Delete</a>

<!-- Add -->
<form action="/add" method="post" class="row g-2">
    <input name="id" class="form-control col" placeholder="ID">
    <input name="name" class="form-control col" placeholder="Name">
    <input name="program" class="form-control col" placeholder="Program">
    <input name="year" class="form-control col" placeholder="Year">
    <button class="btn btn-success col">Add</button>
</form>

<!-- Search -->
<div class="mt-3">
    <input id="search_id" class="form-control" placeholder="Search ID">
    <button onclick="searchStudent()" class="btn btn-info mt-2">Search</button>
    <p id="result"></p>
</div>

<!-- Table -->
<table class="table table-striped mt-4">
<tr>
<th>ID</th><th>Name</th><th>Program</th><th>Year</th><th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>
<td>
    <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</table>

</div>

<script>
function searchStudent() {
    let id = document.getElementById("search_id").value;

    fetch("/search", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "id=" + id
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            document.getElementById("result").innerText = "Not found";
        } else {
            document.getElementById("result").innerText =
                data.id + " - " + data.name + " - " + data.program + " - Year " + data.year;
        }
    });
}
</script>

</body>
</html>
